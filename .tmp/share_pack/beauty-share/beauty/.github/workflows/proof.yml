name: Proof Pack CI
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-proof:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
      - name: Sync models (spec→lock)
        run: |
          python3 -m pip install -U requests onnx onnxsim coremltools mediapipe
          python3 scripts/models_sync.py --mirror-base "${{ secrets.MODEL_MIRROR_BASE }}"
      - name: Pick latest iPhone simulator
        run: |
          cat > scripts/choose-simulator.sh <<'EOS'
          set -euo pipefail
          CANDIDATES=("iPhone 16 Pro" "iPhone 16" "iPhone 15 Pro" "iPhone 15" "iPhone 14 Pro" "iPhone 14")
          DEVICE_NAME=""
          for d in "${CANDIDATES[@]}"; do
            if xcrun simctl list devicetypes | grep -q "$d"; then DEVICE_NAME="$d"; break; fi
          done
          [ -z "$DEVICE_NAME" ] && echo "No desired simulator found" && exit 1
          echo "DEVICE_NAME=$DEVICE_NAME" >> $GITHUB_ENV
          EOS
          bash scripts/choose-simulator.sh
      - name: Build for testing
        run: xcodebuild -scheme beauty -sdk iphonesimulator -destination "platform=iOS Simulator,name=${{ env.DEVICE_NAME }}" build-for-testing
      - name: Validate models via UnitTest
        run: xcodebuild -scheme beauty -sdk iphonesimulator -destination "platform=iOS Simulator,name=${{ env.DEVICE_NAME }}" test -only-testing:ModelLockTests
      - name: Run ProofPack UITests
        run: |
          xcodebuild -scheme beauty -sdk iphonesimulator -destination "platform=iOS Simulator,name=${{ env.DEVICE_NAME }}" test -only-testing:ProofPackUITests
      - name: Archive proof artifacts
        run: |
          PROOF_DIR=$(find ~/Library/Developer/Xcode/DerivedData -type d -path "*/Containers/Data/Documents/proof" | head -n 1)
          if [ -n "$PROOF_DIR" ]; then (cd "$PROOF_DIR/.." && zip -r proof-pack.zip proof); mv "$PROOF_DIR/../proof-pack.zip" .; else echo "no proof dir"; fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proof-pack
          path: proof-pack.zip



