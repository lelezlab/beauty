name: iOS CI
on:
  push: { branches: ["**"] }
  pull_request:
jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'
      - name: Resolve
        run: xcodebuild -resolvePackageDependencies -scheme beauty
      - name: Build-for-testing
        run: xcodebuild -scheme beauty -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' build-for-testing
      - name: Test
        run: xcodebuild -scheme beauty -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' test -quiet || true


