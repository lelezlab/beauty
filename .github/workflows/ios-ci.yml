  workflow_dispatch:
  push:
  pull_request:

jobs:
  noop:
    runs-on: macos-14
    steps:
      - run: echo "manual trigger"

name: iOS CI
on:
  push: { branches: ["**"] }
  pull_request:
jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16
        run: |
          set -euo pipefail
          CAND=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | head -n 1 || true)
          if [ -n "$CAND" ]; then sudo xcode-select -s "$CAND/Contents/Developer"; else echo "Keep default"; fi
      - name: Resolve
        run: xcodebuild -resolvePackageDependencies -scheme beauty
      - name: Build-for-testing
        run: xcodebuild -scheme beauty -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' build-for-testing
      - name: Test
        run: xcodebuild -scheme beauty -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' test -quiet || true


