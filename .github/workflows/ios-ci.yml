name: iOS CI (Simulator Build)

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

- name: Select Xcode
  uses: maxim-lobanov/setup-xcode@v1
  with:
    xcode-version: '16.*'


      - name: Xcode Version
        run: |
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode16-deriveddata

      - name: Resolve (SwiftPM)
        run: xcodebuild -resolvePackageDependencies -scheme beauty

      - name: Build (iOS Simulator)
        run: |
          set -euo pipefail
          xcodebuild \
            -scheme beauty \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build

      - name: Unit Tests (first available iPhone sim)
        run: |
          set -euo pipefail
          NAME=$(xcrun simctl list devices available | grep -E 'iPhone' | head -n1 | sed -E 's/^\s*([^(]+)\s*\(.*/\1/')
          echo "Using simulator: $NAME"
          xcodebuild \
            -scheme beauty \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=$NAME" \
            -skip-testing:beautyUITests \
            test || true
