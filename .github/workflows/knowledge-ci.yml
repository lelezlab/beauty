name: Knowledge CI
on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch: {}
jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: "3.10" }
      - run: pip install -r server/rag/requirements.txt
      - name: Sync literature
        run: python server/scripts/literature_sync.py
      - name: Upload knowledge artifact
        uses: actions/upload-artifact@v4
        with:
          name: kb_articles
          path: server/rag/data/kb_articles.json


