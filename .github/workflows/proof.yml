name: Proof Pack
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  proof:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
      - name: Build and run UITest
        run: |
          xcodebuild -scheme beauty -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' build-for-testing
          xcodebuild -scheme beauty -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' test -only-testing:ProofPackUITests -quiet || true
      - name: Upload proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proof-pack
          path: beauty.app/../**/proof/**

